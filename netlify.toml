[build]
  command = "cd frontend && npm install && npm run build"
  publish = "frontend/dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/portfolio/contact"
  to = "/.netlify/functions/contact"
  status = 200

[[redirects]]
  from = "/api/portfolio/health"
  to = "/.netlify/functions/health"
  status = 200
